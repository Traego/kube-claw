apiVersion: v1
kind: Service
metadata:
  name: claw-controller
  labels:
    app.kubernetes.io/name: claw-controller
spec:
  selector:
    app.kubernetes.io/name: claw-controller
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: ui
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
