apiVersion: v1
kind: Service
metadata:
  name: claw-controller
  labels:
    app.kubernetes.io/name: claw-controller
  {{- if and .Values.ui.ingress.enabled .Values.ui.ingress.gke }}
  {{- if .Values.ui.ingress.gke.managedCert }}
  annotations:
    # Per-port health checks (BackendConfig) for the GKE Ingress LB: the ui port
    # checks /ui/secret-intake/*, the api port checks /healthz — instead of "/".
    cloud.google.com/backend-config: '{"ports": {"ui": "claw-ui-bc"{{ if .Values.ui.ingress.adminUI }}, "api": "claw-api-bc"{{ end }}}}'
  {{- end }}
  {{- end }}
spec:
  selector:
    app.kubernetes.io/name: claw-controller
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: ui
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
